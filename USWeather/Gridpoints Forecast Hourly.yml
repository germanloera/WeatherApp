info:
  name: Gridpoints Forecast Hourly
  type: http
  seq: 7

http:
  method: GET
  url: https://api.weather.gov/gridpoints/:wfo/:center/forecast/hourly?units=si
  headers:
    - name: Accept
      value: application/geo+json
    - name: Content-Type
      value: undefined
    - name: User-Agent
      value: (american_weather, gloera.adeve@gmail.com)
    - name: Feature-Flags
      value: forecast_temperature_qv,forecast_wind_speed_qv
  params:
    - name: units
      value: si
      type: query
    - name: center
      value: 54,33
      type: path
    - name: wfo
      value: DTX
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
