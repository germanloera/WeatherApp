info:
  name: Gridpoints Forecast
  type: http
  seq: 5

http:
  method: GET
  url: https://api.weather.gov/gridpoints/:wfo/:center
  headers:
    - name: accept
      value: application/geo+json
  params:
    - name: center
      value: 54,33
      type: path
    - name: wfo
      value: DTX
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
