info:
  name: Stations
  type: http
  seq: 3

http:
  method: GET
  url: https://api.weather.gov/stations?limit=10&id=KDTX
  headers:
    - name: Accept
      value: application/geo+json
    - name: Content-Type
      value: undefined
    - name: User-Agent
      value: (american_weather, gloera.adeve@gmail.com)
    - name: Feature-Flags
      value: forecast_temperature_qv,forecast_wind_speed_qv
  params:
    - name: state
      value: MI
      type: query
      disabled: true
    - name: radius
      value: "50"
      type: query
      disabled: true
    - name: limit
      value: "10"
      type: query
    - name: id
      value: KDTX
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
